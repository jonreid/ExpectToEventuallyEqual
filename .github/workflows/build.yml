name: Build

on:
  workflow_dispatch:
  schedule:
    # each 4th day of month
    - cron: "0 0 4 * *"
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  # Cancel any in-progress workflows for this workflow/branch combination.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Run tests
      run: ./run_tests.sh

  auto-merge:
      needs: [ build ]
      runs-on: ubuntu-latest
      permissions:
        contents: write
        pull-requests: write
      steps:
        - uses: actions/checkout@v6
        - name: auto-merge
          if: |
            github.actor == 'dependabot[bot]' &&
            github.event_name == 'pull_request'
          env:
            PR_URL: ${{ github.event.pull_request.html_url }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # built-in token
          run: |
            GH_TOKEN="$GITHUB_TOKEN" ./merge_dependabot.sh
